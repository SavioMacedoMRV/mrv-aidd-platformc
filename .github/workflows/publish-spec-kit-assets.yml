name: Publish Spec Kit Assets

on:
  push:
    tags:
      - 'mrv-aidd-platform-v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata from tag
        id: metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -notmatch '^mrv-aidd-platform-v(.+)$') {
            throw "Tag nao suportada: $tag"
          }

          $version = $Matches[1]
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate package versions
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.metadata.outputs.version }}"
          $manifests = @(
            @{ Path = 'extensions/mrv-aidd-producao/extension.yml'; Pattern = 'extension:\s*(?:\r?\n(?:\s+.*))*?\r?\n\s+version:\s*"([^"]+)"' },
            @{ Path = 'presets/mrv-aidd-producao-backend/preset.yml'; Pattern = 'preset:\s*(?:\r?\n(?:\s+.*))*?\r?\n\s+version:\s*"([^"]+)"' },
            @{ Path = 'presets/mrv-aidd-producao-frontend/preset.yml'; Pattern = 'preset:\s*(?:\r?\n(?:\s+.*))*?\r?\n\s+version:\s*"([^"]+)"' }
          )

          foreach ($manifest in $manifests) {
            $content = Get-Content -Path $manifest.Path -Raw
            $match = [regex]::Match($content, $manifest.Pattern)

            if (-not $match.Success) {
              throw "Versao nao encontrada em $($manifest.Path)"
            }

            $manifestVersion = $match.Groups[1].Value

            if ($manifestVersion -ne $version) {
              throw "Tag $tag nao bate com a versao do manifesto $($manifest.Path) ($manifestVersion)"
            }
          }

      - name: Package extension asset
        shell: pwsh
        run: |
          ./scripts/package-spec-kit-assets.ps1 -PackageType extension -PackageId mrv-aidd-producao

      - name: Package backend preset asset
        shell: pwsh
        run: |
          ./scripts/package-spec-kit-assets.ps1 -PackageType preset -PackageId mrv-aidd-producao-backend

      - name: Package frontend preset asset
        shell: pwsh
        run: |
          ./scripts/package-spec-kit-assets.ps1 -PackageType preset -PackageId mrv-aidd-producao-frontend

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mrv-aidd-producao-${{ steps.metadata.outputs.version }}.zip
            dist/mrv-aidd-producao-backend-${{ steps.metadata.outputs.version }}.zip
            dist/mrv-aidd-producao-frontend-${{ steps.metadata.outputs.version }}.zip
          generate_release_notes: true

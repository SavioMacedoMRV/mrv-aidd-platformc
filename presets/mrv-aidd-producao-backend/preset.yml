schema_version: "1.0"

preset:
  id: "mrv-aidd-producao-backend"
  name: "MRV AIDD Producao Backend"
  version: "0.2.0"
  description: "Preset plug and play de backend para AIDD na MRV, reunindo ownership Azure DevOps e artefatos em portugues do Brasil"
  author: "MRV"
  repository: "https://github.com/SavioMacedoMRV/mrv-aidd-platformc"
  license: "MIT"

requires:
  speckit_version: ">=0.5.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Template de spec com ownership de backend, rastreabilidade Azure DevOps e handoff para frontend"
      replaces: "spec-template"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Template de plano de implementacao em portugues do Brasil"
      replaces: "plan-template"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Template de tarefas em portugues do Brasil"
      replaces: "tasks-template"
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Template de checklist em portugues do Brasil"
      replaces: "checklist-template"
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Comando specify que preenche o template de ownership de backend e preserva historias frontend"
      replaces: "speckit.specify"
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Comando clarify que preserva historias front e aprofunda apenas o ownership de backend"
      replaces: "speckit.clarify"
    - type: "command"
      name: "speckit.mrv-aidd-producao.sincronizar-us-devops"
      file: "commands/speckit.mrv-aidd-producao.sincronizar-us-devops.md"
      description: "Comando sincronizar-us-devops que sincroniza apenas historias de backend e protege work items marcados como front"
      replaces: "speckit.mrv-aidd-producao.sincronizar-us-devops"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Comando plan que exige artefatos de planejamento em portugues do Brasil"
      replaces: "speckit.plan"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Comando tasks que exige geracao de tarefas em portugues do Brasil"
      replaces: "speckit.tasks"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Comando implement que exige escopo por US e mensagens em portugues do Brasil"
      replaces: "speckit.implement"
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Comando checklist que exige geracao de checklist em portugues do Brasil"
      replaces: "speckit.checklist"

tags:
  - "mrv"
  - "aidd"
  - "backend"
  - "azure-devops"
  - "pt-br"
  - "workflow"
